name: Build geoip

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 */3 * *'
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "LICENSE"
      - "release/**"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      CURL: "curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused"

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout v2fly/geoip
        uses: actions/checkout@v4
        with:
          repository: v2fly/geoip
          path: geoip
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: geoip/go.mod
          cache: true

      # ============================
      # Download input lists
      # ============================
      - name: Download direct.txt (RU)
        working-directory: geoip
        run: |
          set -euo pipefail
          ${{ env.CURL }} -o direct.txt \
            https://raw.githubusercontent.com/hydraponique/roscomvpn-geoip/refs/heads/release/text/direct.txt

      - name: Download private.txt (PRIVATE)
        working-directory: geoip
        run: |
          set -euo pipefail
          ${{ env.CURL }} -o private.txt \
            https://raw.githubusercontent.com/hydraponique/roscomvpn-geoip/refs/heads/release/text/private.txt

      # ============================
      # Use config.json from repo
      # ============================
      - name: Copy config.json
        run: |
          cp -f config.json geoip/config.json

      - name: Build geoip tool
        working-directory: geoip
        run: |
          set -euo pipefail
          go mod download
          go build -o geoip

      - name: Validate inputs
        working-directory: geoip
        run: |
          set -euo pipefail
          python3 -c "import json,sys; d=json.load(open('config.json')); sys.exit(0 if ('input' in d and 'output' in d) else 1)"
          test -s direct.txt
          test -s private.txt

      - name: Generate geoip artifacts
        working-directory: geoip
        run: |
          set -euo pipefail
          rm -rf output
          ./geoip -c config.json
          ls -l output/dat/*.dat

      # ============================
      # Prepare temp release files
      # ============================
      - name: Prepare temp release files
        run: |
          mkdir -p /tmp/geoip-release
          cp geoip/output/dat/geoip.dat /tmp/geoip-release/geoip.dat
          sha256sum /tmp/geoip-release/geoip.dat > /tmp/geoip-release/geoip.dat.sha256

      # ============================
      # Publish to release branch (correct way)
      # ============================
      - name: Publish to release branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch origin

          if git show-ref --verify --quiet refs/heads/release; then
            git checkout release
          elif git show-ref --verify --quiet refs/remotes/origin/release; then
            git checkout -b release origin/release
          else
            git checkout --orphan release
          fi

          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx

          cp /tmp/geoip-release/geoip.dat ./geoip.dat
          cp /tmp/geoip-release/geoip.dat.sha256 ./geoip.dat.sha256

          git add geoip.dat geoip.dat.sha256

          if ! git diff --staged --quiet; then
            git commit -m "build: update geoip files ($(date +%Y-%m-%d))"
            git push origin HEAD:release --force
          else
            echo "✅ Файлы без изменений"
          fi

      # ============================
      # Restore files for GitHub Release
      # ============================
      - name: Restore files for GitHub Release
        run: |
          mkdir -p output
          cp /tmp/geoip-release/geoip.dat output/geoip.dat
          cp /tmp/geoip-release/geoip.dat.sha256 output/geoip.dat.sha256

      # ============================
      # Create GitHub Release
      # ============================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: GeoIP build #${{ github.run_number }}
          body: |
            Автоматическая сборка GeoIP для Xray/Sing-box

            🔄 Run: #${{ github.run_number }}
            🔗 Commit: ${{ github.sha }}

            📦 Форматы:
            - geoip.dat (V2Ray/Xray/Sing-box)

            🌐 jsDelivr CDN:
            ```
            https://cdn.jsdelivr.net/gh/kirilllavrov/geoip-builder@release/geoip.dat
            ```
          files: |
            output/geoip.dat
            output/geoip.dat.sha256
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Return to main branch
        run: |
          git checkout main
