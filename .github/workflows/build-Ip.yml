name: Build geoip

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 */3 * *'
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "LICENSE"
      - "release/**"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      CURL: "curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused"

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout v2fly/geoip
        uses: actions/checkout@v6
        with:
          repository: v2fly/geoip
          path: geoip
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: geoip/go.mod
          cache: true
          cache-dependency-path: geoip/go.sum

      # ============================================================
      # 🔥 direct.txt → категория ru
      # ============================================================
      - name: Download direct.txt (RU category)
        working-directory: geoip
        run: |
          set -euo pipefail
          ${{ env.CURL }} -o direct.txt \
            https://raw.githubusercontent.com/hydraponique/roscomvpn-geoip/refs/heads/release/text/direct.txt

      # ============================================================
      # 🔥 config.json под наш случай
      # ============================================================
      - name: Write custom config.json
        working-directory: geoip
        run: |
          cat > config.json << 'EOF'
          {
            "input": [
              {
                "type": "text",
                "action": "add",
                "args": {
                  "name": "ru",
                  "uri": "./direct.txt"
                }
              }
            ],
            "output": [
              {
                "type": "v2rayGeoIPDat",
                "args": {
                  "outputDir": "./output/dat"
                }
              },
              {
                "type": "text",
                "args": {
                  "outputDir": "./output/text"
                }
              }
            ]
          }
          EOF

      - name: Build geoip tool
        working-directory: geoip
        run: |
          set -euo pipefail
          go mod download
          go build -o geoip

      - name: Validate config.json and input files
        working-directory: geoip
        run: |
          set -euo pipefail
          python3 -c "import json; d=json.load(open('config.json')); assert 'input' in d and 'output' in d"
          test -s direct.txt

      - name: Generate geoip artifacts
        working-directory: geoip
        run: |
          set -euo pipefail
          rm -rf output
          ./geoip -c config.json
          ls -l output/dat/*.dat

      # ============================================================
      # Mihomo + Sing-box
      # ============================================================
      - name: Install Mihomo (latest stable .deb)
        run: |
          set -euo pipefail
          ARCH=$(dpkg --print-architecture)
          LATEST_URL=$(${{ env.CURL }} https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep -oP '"browser_download_url":\s*"\K[^"]*mihomo-linux-'"$ARCH"'-[^"]*\.deb(?=")' | head -n1)
          echo "Downloading: $LATEST_URL"
          ${{ env.CURL }} -o /tmp/mihomo.deb "$LATEST_URL"
          sudo dpkg -i /tmp/mihomo.deb || sudo apt-get install -f -y
          rm -f /tmp/mihomo.deb

      - name: Install sing-box
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ${{ env.CURL }} https://sing-box.app/install.sh | sudo -E sh -s -- --version 1.12.12

      - name: Prepare workdir (copy ALL text files + clean with awk)
        run: |
          set -euo pipefail
          work=/tmp/geoip-text
          rm -rf "$work"
          mkdir -p "$work"
          shopt -s nullglob
          cp -f geoip/output/text/*.txt "$work"/
          shopt -u nullglob
          for f in "$work"/*.txt; do
            tmp="$(mktemp)"
            awk 'function trim(s){ sub(/^[ \t]+/, "",s); sub(/[ \t]+$/, "",s); return s } { gsub(/\r/, ""); s=$0; sub(/[ \t]*#.*/, "", s); sub(/[ \t]*\/\/.*/, "", s); sub(/[ \t]*@.*/, "", s); s=trim(s); if (s=="") next; print s }' "$f" > "$tmp"
            mv "$tmp" "$f"
          done

      - name: Build mihomo .mrs from workdir
        run: |
          set -euo pipefail
          src=/tmp/geoip-text
          out=/tmp/mihomo/rulesets
          rm -rf /tmp/mihomo
          mkdir -p "$out"
          shopt -s nullglob
          for f in "$src"/*.txt; do
            bn="$(basename "$f")"
            base="${bn%.txt}"
            dest="$out/${base}.mrs"
            mihomo convert-ruleset ipcidr text "$f" "$dest"
          done
          shopt -u nullglob

      - name: Build sing-box .srs from workdir
        run: |
          set -euo pipefail
          src=/tmp/geoip-text
          out=/tmp/sing-box/rulesets
          rm -rf /tmp/sing-box
          mkdir -p "$out"
          shopt -s nullglob
          for f in "$src"/*.txt; do
            bn="$(basename "$f")"
            base="${bn%.txt}"
            dest="$out/${base}.srs"
            tmp_json="$(mktemp)"
            if test -s "$f"; then
              awk 'BEGIN { first=1; printf("{\"version\":3,\"rules\":[{\"ip_cidr\":[") } { if (first==0) printf(", "); printf("\"%s\"", $0); first=0 } END { printf("]}]}") }' "$f" > "$tmp_json"
            else
              printf '{"version":3,"rules":[]}' > "$tmp_json"
            fi
            sing-box rule-set compile --output "$dest" "$tmp_json"
            rm -f "$tmp_json"
          done
          shopt -u nullglob

      # ============================================================
      # MAIN → release + GitHub Release + CDN purge
      # ============================================================
      - name: MAIN Prepare release directory and archives
        if: github.ref_name == 'main'
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release/text release/mihomo release/sing-box
          cp geoip/output/dat/*.dat release/
          cp -f /tmp/geoip-text/*.txt release/text/
          cp -a /tmp/mihomo/rulesets/. release/mihomo/
          cp -a /tmp/sing-box/rulesets/. release/sing-box/
          tar -czf /tmp/text.tar.gz -C release text
          tar -czf /tmp/mihomo.tar.gz -C release mihomo
          tar -czf /tmp/sing-box.tar.gz -C release sing-box
          sha256sum release/geoip.dat > release/geoip.dat.sha256

      - name: MAIN Push to release branch and update main
        if: github.ref_name == 'main'
        run: |
          cd release || exit 1
          git init
          git config --local user.name "kirilllavrov"
          git config --local user.email "kirilllavrov@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "Release $(date -u +%Y%m%d)"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release
          cd ..

      - name: MAIN Publish GitHub Release
        if: github.ref_name == 'main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: GeoIP build
          body: |
            Автоматическая сборка geoip для Xray (Sing-box)

            🔄 Run: #${{ github.run_number }}
            🔗 Commit: ${{ github.sha }}
            📦 Форматы:
            - geoip.dat (V2Ray/Xray/Sing-box)

            🌐 jsDelivr CDN:
            ```
            https://cdn.jsdelivr.net/gh/${{ github.repository }}@release/geoip.dat
            ```
          files: |
            release/*.dat
            release/*.dat.sha256
            /tmp/mihomo.tar.gz
            /tmp/sing-box.tar.gz
            /tmp/text.tar.gz

      - name: MAIN Purge CDN
        if: github.ref_name == 'main'
        run: |
          set -euo pipefail
          cd release || exit 1
          find . -type f -not -path "./.git/*" -print0 | while IFS= read -r -d '' f; do
            rel="${f#./}"
            ${{ env.CURL }} -i "https://purge.jsdelivr.net/gh/${{ github.repository }}/release/${rel}"
            ${{ env.CURL }} -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${rel}"
          done
