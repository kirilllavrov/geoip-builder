name: Build geoip

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 */3 * *'
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "LICENSE"
      - "release/**"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      CURL: "curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused"

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout v2fly/geoip
        uses: actions/checkout@v6
        with:
          repository: v2fly/geoip
          path: geoip
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: geoip/go.mod
          cache: true
          cache-dependency-path: geoip/go.sum

      # ============================================================
      # direct.txt → категория ru
      # ============================================================
      - name: Download direct.txt (RU category)
        working-directory: geoip
        run: |
          set -euo pipefail
          ${{ env.CURL }} -o direct.txt \
            https://raw.githubusercontent.com/hydraponique/roscomvpn-geoip/refs/heads/release/text/direct.txt

      # ============================================================
      # Используем config.json из репозитория
      # ============================================================
      - name: Copy config.json from repository
        run: |
          cp -f config.json geoip/config.json

      - name: Build geoip tool
        working-directory: geoip
        run: |
          set -euo pipefail
          go mod download
          go build -o geoip

      - name: Validate config.json and input files
        working-directory: geoip
        run: |
          set -euo pipefail
          python3 - << 'EOF'
import json
d = json.load(open('config.json'))
assert 'input' in d and 'output' in d
EOF
          test -s direct.txt

      - name: Generate geoip artifacts
        working-directory: geoip
        run: |
          set -euo pipefail
          rm -rf output
          ./geoip -c config.json
          ls -l output/dat/*.dat

      # ============================================================
      # MAIN → release + GitHub Release + CDN purge
      # ============================================================
      - name: MAIN Prepare release directory
        if: github.ref_name == 'main'
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release
          cp geoip/output/dat/geoip.dat release/
          sha256sum release/geoip.dat > release/geoip.dat.sha256

      - name: MAIN Push to release branch
        if: github.ref_name == 'main'
        run: |
          cd release || exit 1
          git init
          git config --local user.name "kirilllavrov"
          git config --local user.email "kirilllavrov@users.noreply.github.com"
          git checkout -b release
          git add geoip.dat geoip.dat.sha256
          git commit -m "Release $(date -u +%Y%m%d)"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release

      - name: MAIN Publish GitHub Release
        if: github.ref_name == 'main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: GeoIP build
          body: |
            Автоматическая сборка GeoIP для Xray / Sing-box

            🔄 Run: #${{ github.run_number }}
            🔗 Commit: ${{ github.sha }}

            📦 Форматы:
            - geoip.dat (V2Ray / Xray / Sing-box)

            🌐 jsDelivr CDN:
            https://cdn.jsdelivr.net/gh/${{ github.repository }}@release/geoip.dat
          files: |
            release/geoip.dat
            release/geoip.dat.sha256

      - name: MAIN Purge CDN
        if: github.ref_name == 'main'
        run: |
          set -euo pipefail
          ${{ env.CURL }} -i "https://purge.jsdelivr.net/gh/${{ github.repository }}/release/geoip.dat"
          ${{ env.CURL }} -i "https://purge.jsdelivr.net/gh/${{ github.repository }}/release/geoip.dat.sha256"
